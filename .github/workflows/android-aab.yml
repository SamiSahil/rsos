name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22 (latest)
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          check-latest: true

      - name: Verify Node (after setup-node)
        run: |
          echo "NODE=$(node -v)"
          echo "NPM=$(npm -v)"
          which node
          which npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --licenses
          sdkmanager "platform-tools" || true
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0" || true

      - name: Install mobile deps
        working-directory: mobile
        run: |
          node -v
          npm -v
          npm ci || npm install
          npx --yes cap --version

      - name: Verify Node (before cap sync)
        run: |
          echo "NODE=$(node -v)"
          echo "NPM=$(npm -v)"
          which node
          which npm

      - name: Capacitor sync android
        working-directory: mobile
        run: npx --yes cap sync android

      - name: Decode keystore
        working-directory: mobile/android/app
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks
          ls -la

      - name: Build Release AAB
        working-directory: mobile/android
        env:
          KEYSTORE_FILE: app/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: RestOS-Android-AAB
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab